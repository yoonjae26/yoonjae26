<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 320" width="1400" height="320" role="img" aria-label="Design manifesto">

  <!-- Off-white paper -->
  <rect width="1400" height="320" fill="#f7f5f0"/>

  <!-- Top hairline -->
  <line x1="100" y1="50" x2="1300" y2="50" stroke="#1a1a1a" stroke-width="0.5"/>
  <text x="100" y="42" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="10" fill="#1a1a1a" letter-spacing="3">03 / MANIFESTO</text>
  <text x="1300" y="42" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="10" fill="#666666" letter-spacing="2" text-anchor="end">CREDO</text>

  <!-- Large opening quote mark -->
  <text x="160" y="155" font-family="Georgia, 'Times New Roman', serif" font-size="120" fill="#c8202e" font-weight="300" opacity="0.4">&quot;</text>

  <!-- Main manifesto text - multi-line -->
  <text x="240" y="135" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-style="italic" font-weight="300" fill="#1a1a1a">A robot that can fall</text>
  <text x="240" y="178" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-style="italic" font-weight="300" fill="#1a1a1a">is a robot that can learn.</text>

  <!-- Secondary line -->
  <text x="240" y="222" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="300" fill="#666666">I build the second kind.</text>

  <!-- Attribution dash -->
  <line x1="240" y1="255" x2="280" y2="255" stroke="#1a1a1a" stroke-width="1"/>
  <text x="290" y="259" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="11" fill="#1a1a1a" letter-spacing="2">YOON JAE / JEJU / 2025</text>

  <!-- Bottom hairline -->
  <line x1="100" y1="290" x2="1300" y2="290" stroke="#1a1a1a" stroke-width="0.5"/>
</svg>
