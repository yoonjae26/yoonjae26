<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="Yoon Jae — AI Engineer & Robotics Researcher">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1419"/>
      <stop offset="100%" stop-color="#1a1f2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8e6e3" stop-opacity="0"/>
      <stop offset="50%" stop-color="#e8e6e3" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#e8e6e3" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2a3142" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#grid)" opacity="0.5"/>

  <!-- Top hairline -->
  <line x1="80" y1="60" x2="1120" y2="60" stroke="url(#accent)" stroke-width="1"/>

  <!-- Tiny eyebrow text -->
  <text x="80" y="50" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="11" fill="#7a8294" letter-spacing="4">
    ESSAYS · CODE · ROBOTICS — N° 026
  </text>

  <!-- Main name -->
  <text x="80" y="155" font-family="'Playfair Display', Georgia, serif" font-size="84" font-weight="400" fill="#e8e6e3" font-style="italic">
    Yoon Jae
  </text>

  <!-- Subtitle -->
  <text x="80" y="200" font-family="Georgia, serif" font-size="22" fill="#a8b0c0" font-style="italic">
    AI engineer teaching robots to see, listen, and move.
  </text>

  <!-- Tagline strip -->
  <line x1="80" y1="240" x2="200" y2="240" stroke="#e8e6e3" stroke-width="1"/>
  <text x="80" y="268" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="12" fill="#7a8294" letter-spacing="2">
    JEJU, KR  ·  CURRENTLY: UNITREE GO2  ·  EST. 2022
  </text>

  <!-- Decorative robot dog silhouette (right side) -->
  <g transform="translate(880, 110)" opacity="0.85">
    <!-- Body -->
    <rect x="20" y="40" width="140" height="50" rx="8" fill="none" stroke="#a8b0c0" stroke-width="1.5"/>
    <!-- Head -->
    <rect x="150" y="30" width="50" height="40" rx="6" fill="none" stroke="#a8b0c0" stroke-width="1.5"/>
    <!-- Eye/sensor -->
    <circle cx="185" cy="48" r="3" fill="#e8e6e3"/>
    <circle cx="185" cy="48" r="6" fill="none" stroke="#e8e6e3" stroke-width="0.5" opacity="0.5">
      <animate attributeName="r" values="6;10;6" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <!-- Front legs -->
    <line x1="40" y1="90" x2="40" y2="120" stroke="#a8b0c0" stroke-width="1.5"/>
    <line x1="40" y1="120" x2="50" y2="135" stroke="#a8b0c0" stroke-width="1.5"/>
    <line x1="55" y1="90" x2="55" y2="115" stroke="#a8b0c0" stroke-width="1.5"/>
    <line x1="55" y1="115" x2="48" y2="135" stroke="#a8b0c0" stroke-width="1.5"/>
    <!-- Back legs -->
    <line x1="135" y1="90" x2="135" y2="120" stroke="#a8b0c0" stroke-width="1.5"/>
    <line x1="135" y1="120" x2="145" y2="135" stroke="#a8b0c0" stroke-width="1.5"/>
    <line x1="150" y1="90" x2="150" y2="115" stroke="#a8b0c0" stroke-width="1.5"/>
    <line x1="150" y1="115" x2="143" y2="135" stroke="#a8b0c0" stroke-width="1.5"/>
    <!-- Tag label -->
    <text x="100" y="170" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#7a8294" text-anchor="middle" letter-spacing="2">UNITREE GO2</text>
  </g>

  <!-- Bottom hairline -->
  <line x1="80" y1="290" x2="1120" y2="290" stroke="url(#accent)" stroke-width="1"/>
</svg>
