<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 280" width="1400" height="280" role="img" aria-label="Currently working — status dashboard">
  <defs>
    <style>
      .serif { font-family: 'Cormorant Garamond', 'Times New Roman', serif; }
      .sans  { font-family: 'Inter', -apple-system, sans-serif; }
      .mono  { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1400" height="280" fill="#f7f5f0"/>

  <!-- Top dividers -->
  <line x1="100" y1="40" x2="1300" y2="40" stroke="#1a1a1a" stroke-width="0.5"/>

  <!-- Section header -->
  <text x="100" y="30" class="mono" font-size="10" fill="#1a1a1a" letter-spacing="3">02 / WORKBENCH —— STATUS</text>
  <text x="1300" y="30" class="mono" font-size="10" fill="#666" letter-spacing="2" text-anchor="end">UPDATED WEEKLY</text>

  <!-- ============ FOUR COLUMNS ============ -->

  <!-- COLUMN 1: NOW BUILDING -->
  <g transform="translate(100, 70)">
    <text class="mono" font-size="9" fill="#999" letter-spacing="3" y="0">NOW BUILDING</text>

    <!-- Number indicator -->
    <text class="serif" font-size="56" font-weight="300" fill="#1a1a1a" y="55" letter-spacing="-2">01</text>

    <!-- Project name -->
    <text class="serif" font-size="22" font-style="italic" fill="#1a1a1a" y="95">Go2 terrain-aware</text>
    <text class="serif" font-size="22" font-style="italic" fill="#1a1a1a" y="120">locomotion</text>

    <!-- Progress bar -->
    <line x1="0" y1="150" x2="240" y2="150" stroke="#ddd" stroke-width="2"/>
    <line x1="0" y1="150" x2="100" y2="150" stroke="#1a1a1a" stroke-width="2"/>

    <text class="mono" font-size="9" fill="#666" y="170" letter-spacing="1">42% — PHASE 2 / 5</text>
  </g>

  <!-- Vertical divider -->
  <line x1="400" y1="65" x2="400" y2="240" stroke="#ddd" stroke-width="0.5"/>

  <!-- COLUMN 2: READING -->
  <g transform="translate(430, 70)">
    <text class="mono" font-size="9" fill="#999" letter-spacing="3" y="0">READING</text>

    <!-- Book mark visual -->
    <rect x="0" y="20" width="38" height="58" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="0" y1="50" x2="38" y2="50" stroke="#1a1a1a" stroke-width="0.5"/>
    <line x1="6" y1="35" x2="32" y2="35" stroke="#1a1a1a" stroke-width="0.5"/>
    <line x1="6" y1="62" x2="32" y2="62" stroke="#1a1a1a" stroke-width="0.5"/>
    <line x1="6" y1="68" x2="28" y2="68" stroke="#1a1a1a" stroke-width="0.5"/>

    <!-- Title -->
    <text class="serif" font-size="20" font-style="italic" fill="#1a1a1a" y="40" x="55">Reinforcement</text>
    <text class="serif" font-size="20" font-style="italic" fill="#1a1a1a" y="62" x="55">Learning</text>
    <text class="sans" font-size="11" fill="#888" y="80" x="55">Sutton &amp; Barto</text>

    <!-- Tag -->
    <line x1="0" y1="110" x2="20" y2="110" stroke="#1a1a1a" stroke-width="1"/>
    <text class="mono" font-size="10" fill="#1a1a1a" y="114" x="28">CH. 13 / 17</text>

    <text class="sans" font-size="11" fill="#666" y="155">Re-reading the chapter on</text>
    <text class="sans" font-size="11" fill="#666" y="170">policy gradients.</text>
  </g>

  <!-- Vertical divider -->
  <line x1="730" y1="65" x2="730" y2="240" stroke="#ddd" stroke-width="0.5"/>

  <!-- COLUMN 3: METRICS -->
  <g transform="translate(760, 70)">
    <text class="mono" font-size="9" fill="#999" letter-spacing="3" y="0">METRICS</text>

    <!-- Metric 1 -->
    <text class="serif" font-size="36" font-weight="300" fill="#1a1a1a" y="40">3.2k</text>
    <text class="mono" font-size="9" fill="#666" y="55" letter-spacing="2">COMMITS / YEAR</text>

    <!-- Metric 2 -->
    <text class="serif" font-size="36" font-weight="300" fill="#1a1a1a" y="95">14</text>
    <text class="mono" font-size="9" fill="#666" y="110" letter-spacing="2">REPOSITORIES</text>

    <!-- Metric 3 -->
    <text class="serif" font-size="36" font-weight="300" fill="#1a1a1a" y="150">3</text>
    <text class="mono" font-size="9" fill="#666" y="165" letter-spacing="2">YRS IN AI</text>
  </g>

  <!-- Vertical divider -->
  <line x1="970" y1="65" x2="970" y2="240" stroke="#ddd" stroke-width="0.5"/>

  <!-- COLUMN 4: AVAILABILITY -->
  <g transform="translate(1000, 70)">
    <text class="mono" font-size="9" fill="#999" letter-spacing="3" y="0">AVAILABILITY</text>

    <!-- Status indicator -->
    <circle cx="6" cy="38" r="5" fill="#22a06b"/>
    <circle cx="6" cy="38" r="9" fill="none" stroke="#22a06b" stroke-width="0.5" opacity="0.4">
      <animate attributeName="r" values="9;15;9" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite"/>
    </circle>

    <text class="sans" font-size="16" fill="#1a1a1a" y="42" x="20" font-weight="500">Open to collab</text>
    <text class="sans" font-size="11" fill="#666" y="62" x="20">Robotics · AI · Vision</text>

    <line x1="0" y1="90" x2="220" y2="90" stroke="#1a1a1a" stroke-width="0.3"/>

    <text class="mono" font-size="9" fill="#999" y="110" letter-spacing="2">RESPONSE TIME</text>
    <text class="sans" font-size="14" fill="#1a1a1a" y="130">~24 hours</text>

    <text class="mono" font-size="9" fill="#999" y="160" letter-spacing="2">PREFERRED</text>
    <text class="sans" font-size="14" fill="#1a1a1a" y="180">Async first</text>
  </g>

  <!-- Bottom hairline -->
  <line x1="100" y1="260" x2="1300" y2="260" stroke="#1a1a1a" stroke-width="0.3"/>
</svg>
