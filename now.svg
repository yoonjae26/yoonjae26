<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200" role="img" aria-label="Currently working on">
  <defs>
    <linearGradient id="card-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafaf7"/>
      <stop offset="100%" stop-color="#f0eee8"/>
    </linearGradient>
  </defs>

  <!-- Card -->
  <rect width="800" height="200" fill="url(#card-bg)" rx="2"/>
  <rect x="0" y="0" width="800" height="4" fill="#2c2c2c"/>

  <!-- Eyebrow -->
  <text x="40" y="40" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#888" letter-spacing="3">
    THE DESK · UPDATED WEEKLY
  </text>

  <!-- Heading -->
  <text x="40" y="80" font-family="Georgia, serif" font-size="28" font-style="italic" fill="#1a1a1a">
    What's on the bench this week
  </text>

  <!-- Three columns -->
  <g font-family="Georgia, serif">
    <!-- Col 1: Reading -->
    <text x="40" y="120" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#888" letter-spacing="2">READING</text>
    <text x="40" y="142" font-size="14" fill="#1a1a1a">Sutton &amp; Barto,</text>
    <text x="40" y="160" font-size="14" font-style="italic" fill="#1a1a1a">Reinforcement Learning</text>

    <!-- Col 2: Building -->
    <text x="290" y="120" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#888" letter-spacing="2">BUILDING</text>
    <text x="290" y="142" font-size="14" fill="#1a1a1a">Go2 terrain-aware</text>
    <text x="290" y="160" font-size="14" font-style="italic" fill="#1a1a1a">locomotion policy</text>

    <!-- Col 3: Listening -->
    <text x="540" y="120" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#888" letter-spacing="2">LISTENING</text>
    <text x="540" y="142" font-size="14" fill="#1a1a1a">Lex Fridman ×</text>
    <text x="540" y="160" font-size="14" font-style="italic" fill="#1a1a1a">robotics episodes</text>
  </g>

  <!-- Footer -->
  <line x1="40" y1="180" x2="760" y2="180" stroke="#ddd" stroke-width="0.5"/>
</svg>
