name: Update README

on:
  schedule:
    # Chạy hàng ngày lúc 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:  # Cho phép chạy thủ công từ tab Actions
  push:
    branches: [main]
    paths:
      - '.github/scripts/**'
      - '.github/workflows/update-readme.yml'

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update dynamic sections
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USER: yoonjae26
        run: node .github/scripts/update-readme.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "docs: refresh dynamic README sections [skip ci]"
            git push
          fi
